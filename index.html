<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B+ Math</title>

<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="stylesheet" href="styles/style.css">

<style>
/* =========================
   B+ Math Clean UI
========================= */

:root {
  --primary: #b584fa;
  --bg: #ffffff;
  --text: #222;
  --card: #f5f5f5;
  --border: #e6e6e6;
  --shadow: rgba(0,0,0,0.08);
  --radius: 12px;
}

.dark-mode {
  --primary: #2a0163;
  --bg: #121212;
  --text: #eaeaea;
  --card: #1e1e1e;
  --border: #2c2c2c;
  --shadow: rgba(0,0,0,0.35);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Comic Sans MS", "Arial Rounded MT Bold", cursive;
  background: var(--bg);
  color: var(--text);
  transition: 0.25s ease;
}

/* HEADER */

header {
  position: sticky;
  top: 0;
  background: var(--primary);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 10px var(--shadow);
  z-index: 100;
}

.logo {
  font-size: 1.5rem;
  font-weight: 900;
  text-decoration: none;
  color: white;
}

.search-container {
  display: flex;
  gap: 8px;
}

.search-container input,
.search-container select {
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* GRID */

#container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 16px;
  padding: 20px;
}

.game {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 6px var(--shadow);
  transition: 0.2s ease;
  text-align: center;
}

.game:hover {
  transform: translateY(-5px) scale(1.03);
}

.game img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
}

.game h4 {
  margin: 10px 0;
}

/* MODAL */

#gameModal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  z-index: 999;
}

.modalTop {
  background: var(--primary);
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.modalTop button {
  background: transparent;
  border: 1px solid white;
  color: white;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}

#gameFrame {
  flex: 1;
  border: none;
  background: black;
}

/* FOOTER */

footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid var(--border);
}
</style>
</head>

<body class="dark-mode">

<header>
  <a href="/" class="logo">B+ Math</a>
  <div class="search-container">
    <input type="text" id="searchBar" placeholder="Search zones...">
    <select id="sortOptions">
      <option value="name">Name</option>
      <option value="id">ID (Date)</option>
      <option value="popular">Popular</option>
    </select>
  </div>
</header>

<main>
  <div id="container">
    Loading...
  </div>
</main>

<!-- MODAL -->
<div id="gameModal">
  <div class="modalTop">
    <span id="gameTitle">Game</span>
    <button onclick="closeGame()">Close</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<footer>
  © 2026 B+ Math
</footer>

<script src="javascript/index.js"></script>

<script>
function closeGame() {
  const modal = document.getElementById("gameModal");
  const frame = document.getElementById("gameFrame");
  frame.src = "";
  modal.style.display = "none";
}
</script>

</body>
</html>
